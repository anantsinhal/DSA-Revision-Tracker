kind = "web"
previewPath = "/"
title = "AlgoRecall – DSA Revision Tracker"
version = "1.0.0"
id = "artifacts/algo-recall"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20616

[services.development]
run = "pnpm --filter @workspace/algo-recall run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/algo-recall", "run", "build" ]
publicDir = "artifacts/algo-recall/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20616"
BASE_PATH = "/"
